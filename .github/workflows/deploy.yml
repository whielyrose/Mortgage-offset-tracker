name: Build and push Docker images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mortgage-tracker-frontend:latest
            ghcr.io/${{ github.repository_owner }}/mortgage-tracker-frontend:${{ github.sha }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          dockerfile: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mortgage-tracker-api:latest
            ghcr.io/${{ github.repository_owner }}/mortgage-tracker-api:${{ github.sha }}

      - name: Build and push actual-sync image
        uses: docker/build-push-action@v5
        with:
          context: ./actual-sync
          dockerfile: ./actual-sync/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mortgage-tracker-actual-sync:latest
            ghcr.io/${{ github.repository_owner }}/mortgage-tracker-actual-sync:${{ github.sha }}
